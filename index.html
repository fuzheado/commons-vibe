<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commons Vibe Explorer</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.1.1/core.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://pyscript.net/releases/2026.1.1/core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-zinc-200 min-h-screen font-sans">

    <div id="edit-modal" class="fixed inset-0 z-[100] modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl w-full max-w-2xl p-6 shadow-2xl flex flex-col max-h-[90vh]">
            <h2 class="text-lg font-bold text-white mb-2 uppercase tracking-tighter p-6 pb-2">Edit Category List</h2>
            <div class="px-6 flex-1 overflow-hidden flex flex-col">
                <p class="text-[10px] text-zinc-500 mb-4 uppercase tracking-widest">One category per line. Format: <code class="text-blue-400">Category:Name | Label</code></p>
                <textarea id="modal-textarea" class="w-full flex-1 bg-black text-zinc-300 font-mono text-sm p-4 border border-zinc-800 rounded-xl focus:border-blue-500 outline-none mb-4 resize-none h-[50vh] min-h-[400px]"></textarea>
                <div id="modal-error" class="hidden bg-red-900/20 border border-red-500/50 rounded-lg p-3 mb-4">
                    <p class="text-xs text-red-400 font-bold uppercase tracking-wider mb-1">Validation Failed</p>
                    <p id="error-list" class="text-[10px] text-red-300 leading-tight"></p>
                </div>
            </div>
            <div class="p-6 pt-2 flex justify-end gap-3 border-t border-zinc-800">
                <button id="modal-cancel" class="px-6 py-2 text-xs font-bold uppercase tracking-widest text-zinc-500 hover:text-white transition-colors">Cancel</button>
                <button id="modal-save" class="px-6 py-2 bg-blue-600 text-white text-xs font-bold uppercase tracking-widest rounded-lg hover:bg-blue-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="save-btn-text">Apply Changes</span>
                    <span id="save-btn-loading" class="hidden">Validating...</span>
                </button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-zinc-800 p-4 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4 px-4">
            <h1 class="text-xl font-bold text-white tracking-tighter uppercase italic">Commons<span class="text-blue-500 font-black">Vibe</span></h1>
            
            <div class="flex flex-wrap items-center justify-center gap-4">
                <div class="relative">
                    <input id="search-input" type="text" placeholder="Jump to Category..." class="bg-zinc-900 text-[10px] font-bold tracking-widest text-zinc-300 border border-zinc-800 rounded-lg px-4 py-2 w-48 focus:w-64 focus:border-blue-600 outline-none transition-all placeholder:text-zinc-600">
                </div>

                <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 rounded-lg pr-3">
                    <select id="vibe-select" class="bg-transparent text-[10px] font-bold tracking-widest text-zinc-300 px-3 py-2 outline-none focus:text-blue-500 max-w-[180px]"></select>
                    <span id="cat-count" class="text-[9px] font-mono text-blue-500 font-black border-l border-zinc-700 pl-3">0</span>
                </div>

                <div class="flex gap-2">
                    <button id="refresh-btn" class="p-2 bg-zinc-800 hover:bg-blue-600 rounded-lg text-zinc-400 hover:text-white transition-all shadow-lg group" title="Re-shuffle / Refresh">
                        <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                    <button id="edit-list-btn" class="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-zinc-400 hover:text-white transition-all shadow-lg" title="Edit List">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                    </button>
                </div>

                <div class="flex gap-4 border-l border-zinc-800 pl-4">
                    <div class="flex items-center gap-3 bg-zinc-900/50 p-1 px-3 rounded-full border border-zinc-800">
                        <span class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold">Alpha</span>
                        <button id="sort-toggle" class="w-10 h-5 bg-zinc-700 rounded-full relative toggle-transition shadow-inner">
                            <div id="sort-knob" class="absolute top-1 left-1 w-3 h-3 bg-white rounded-full toggle-transition"></div>
                        </button>
                        <span class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold">Shuffle</span>
                    </div>
                    <div class="flex items-center gap-3 bg-zinc-900/50 p-1 px-3 rounded-full border border-zinc-800">
                        <span class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold">Min</span>
                        <button id="view-toggle" class="w-10 h-5 bg-blue-600 rounded-full relative toggle-transition shadow-inner">
                            <div id="view-knob" class="absolute top-1 left-6 w-3 h-3 bg-white rounded-full toggle-transition"></div>
                        </button>
                        <span class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold">Det</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="masonry-container" class="flex flex-row gap-6 items-start">
            <div id="col-0" class="masonry-col flex flex-col gap-6"></div>
            <div id="col-1" class="masonry-col hidden sm:flex flex-col gap-6"></div>
            <div id="col-2" class="masonry-col hidden lg:flex flex-col gap-6"></div>
            <div id="col-3" class="masonry-col hidden xl:flex flex-col gap-6"></div>
        </div>
        <div id="bottom-status" class="py-20 text-center">
            <div id="loading-spinner" class="animate-spin rounded-full h-6 w-6 border-t-2 border-blue-500 mx-auto"></div>
            <h2 id="end-message" class="hidden text-sm text-zinc-600 uppercase tracking-widest mt-4 font-bold">End of Collection</h2>
        </div>
        <div id="sentinel" class="h-10"></div>
    </main>

    <script type="py" async>
        import asyncio
        import re
        import urllib.parse
        import random
        from pyscript import document, window
        from pyodide.http import pyfetch
        from pyodide.ffi import create_proxy

        USER_AGENT = "CommonsVibeExplorer/1.4 (https://commons-vibe.toolforge.org/; contact: User:Fuzheado)"

        VIBE_CONFIG = """
Category:Featured_pictures_on_Wikimedia_Commons | ★ Featured Pictures
Category:Quality_images | Quality Images
Category:Mid-century_modern_architecture | 🏢 MCM Architecture
Category:Autochromes | 🎞️ Autochromes
Category:Pictures_of_the_Year_(2024)
        """.strip()

        # Global State
        continue_token = None
        is_loading = False
        has_reached_end = False
        sort_mode_shuffle = False 
        minimal_view = False
        current_category = ""
        current_col_idx = 0
        seen_titles = set()

        async def fetch_cat_info():
            global current_category
            headers = {"User-Agent": USER_AGENT}
            params = {"action": "query", "titles": current_category, "prop": "categoryinfo", "format": "json", "origin": "*"}
            try:
                resp = await pyfetch(f"https://commons.wikimedia.org/w/api.php?{urllib.parse.urlencode(params)}", headers=headers)
                data = await resp.json()
                pages = data.get('query', {}).get('pages', {})
                count = 0
                for k, v in pages.items():
                    count = v.get('categoryinfo', {}).get('files', 0)
                document.getElementById("cat-count").innerText = f"{count:,}"
            except: 
                document.getElementById("cat-count").innerText = "0"

        def update_url():
            global current_category, sort_mode_shuffle, minimal_view
            params = urllib.parse.urlencode({
                "cat": current_category,
                "sort": "shuffle" if sort_mode_shuffle else "alpha",
                "view": "min" if minimal_view else "det"
            })
            window.history.replaceState(None, "", f"?{params}")

        async def rebuild_dropdown():
            global VIBE_CONFIG, current_category
            select = document.getElementById("vibe-select")
            select.innerHTML = ""
            lines = [line.strip() for line in VIBE_CONFIG.strip().split('\n') if line.strip()]
            config_cats = [l.split('|')[0].strip() if '|' in l else l.strip() for l in lines]
            
            if not current_category and config_cats:
                current_category = config_cats[0]
            
            # All categories to show in dropdown
            display_lines = lines[:]
            if current_category and current_category not in config_cats:
                display_lines.append(current_category)

            for line in display_lines:
                cat, label = [p.strip() for p in line.split('|')] if '|' in line else (line.strip(), line.strip().replace("Category:", "").replace("_", " "))
                opt = document.createElement("option")
                opt.value = cat
                opt.text = label
                opt.selected = (cat == current_category)
                select.add(opt)

        async def reset_and_fetch():
            global continue_token, current_col_idx, has_reached_end, is_loading, seen_titles
            is_loading = False
            current_col_idx = 0
            has_reached_end = False
            continue_token = None
            seen_titles = set()
            
            document.getElementById("end-message").classList.add("hidden")
            document.getElementById("loading-spinner").classList.remove("hidden")
            for i in range(4): 
                document.getElementById(f"col-{i}").innerHTML = ""
            
            update_url()
            asyncio.create_task(fetch_cat_info())
            await fetch_images()

        def clean_html(text):
            if not text: return ""
            # Simple regex to strip HTML tags
            return re.sub(r'<[^>]+>', '', text).strip()

        async def fetch_images():
            global continue_token, is_loading, current_col_idx, has_reached_end, seen_titles, current_category, sort_mode_shuffle
            if is_loading or has_reached_end: 
                return
            is_loading = True
            try:
                pages_to_render = []
                headers = {"User-Agent": USER_AGENT}
                
                if sort_mode_shuffle:
                    # Clean category name for incategory search
                    cat_name = current_category.replace("Category:", "").replace("_", " ")
                    params = {
                        "action": "query",
                        "list": "search",
                        "srsearch": f'incategory:"{cat_name}"',
                        "srnamespace": 6,
                        "srlimit": 24, # Fetch more to account for duplicates
                        "srsort": "random",
                        "format": "json",
                        "origin": "*"
                    }
                    search_resp = await pyfetch(f"https://commons.wikimedia.org/w/api.php?{urllib.parse.urlencode(params)}", headers=headers)
                    search_data = await search_resp.json()
                    search_results = search_data.get('query', {}).get('search', [])

                    if search_results:
                        titles_to_fetch = []
                        for result in search_results:
                            if result['title'] not in seen_titles:
                                titles_to_fetch.append(result['title'])
                                seen_titles.add(result['title'])
                            if len(titles_to_fetch) >= 12: 
                                break
                        
                        if titles_to_fetch:
                            info_params = {
                                "action": "query",
                                "titles": "|".join(titles_to_fetch),
                                "prop": "imageinfo",
                                "iiprop": "url|extmetadata",
                                "iiurlwidth": 600,
                                "format": "json",
                                "origin": "*"
                            }
                            info_url = f"https://commons.wikimedia.org/w/api.php?{urllib.parse.urlencode(info_params)}"
                            info_resp = await pyfetch(info_url, headers=headers)
                            info_data = await info_resp.json()
                            pages_to_render = list(info_data.get('query', {}).get('pages', {}).values())
                    else:
                        has_reached_end = True
                else: 
                    # Alphabetical sort mode
                    params = {
                        "action": "query", 
                        "generator": "categorymembers", 
                        "gcmtitle": current_category, 
                        "gcmtype": "file", 
                        "gcmlimit": "12", 
                        "prop": "imageinfo", 
                        "iiprop": "url|extmetadata", 
                        "iiurlwidth": "600", 
                        "format": "json", 
                        "origin": "*"
                    }
                    if continue_token: 
                        params.update(continue_token)
                    resp = await pyfetch(f"https://commons.wikimedia.org/w/api.php?{urllib.parse.urlencode(params)}", headers=headers)
                    data = await resp.json()
                    continue_token = data.get('continue')
                    pages_to_render = list(data.get('query', {}).get('pages', {}).values())
                    
                    # If no continue token is present in the response, we've reached the end
                    if not continue_token:
                        has_reached_end = True

                if pages_to_render:
                    cols = [1, 2, 3, 4][(window.innerWidth >= 640) + (window.innerWidth >= 1024) + (window.innerWidth >= 1280)]
                    for page in pages_to_render:
                        if 'imageinfo' in page:
                            info = page['imageinfo'][0]
                            metadata = info.get('extmetadata', {})
                            
                            clean_title = page['title'].replace("File:", "")
                            
                            # Improved description logic
                            # Try ImageDescription, then description, then ObjectName
                            descr_data = metadata.get('ImageDescription') or metadata.get('description') or metadata.get('ObjectName')
                            if descr_data:
                                description = clean_html(descr_data.get('value', ''))
                            else:
                                description = clean_title
                                
                            card = document.createElement("div")
                            card.className = "group relative bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden hover:border-zinc-500 transition-all shadow-xl mb-6"
                            card.innerHTML = f"""
                                <a href="https://commons.wikimedia.org/wiki/{urllib.parse.quote(page['title'])}" target="_blank" class="block overflow-hidden bg-zinc-800">
                                    <img src="{info['thumburl']}" class="w-full h-auto transition-transform duration-700 group-hover:scale-105" loading="lazy">
                                </a>
                                <a href="https://commons.wikimedia.org/wiki/{urllib.parse.quote(page['title'])}" target="_blank" class="card-text-area p-5 no-underline flex flex-col gap-y-2">
                                    <h3 class="text-[9px] font-black text-blue-500 uppercase tracking-widest truncate" title="{clean_title}">{clean_title}</h3>
                                    <p class="text-[11px] text-zinc-400 leading-relaxed font-medium line-clamp-3">
                                        {description}
                                    </p>
                                    <div class="card-footer pt-3 border-t border-zinc-800/50">
                                        <div class="inline-block text-[9px] font-bold text-white bg-zinc-800 hover:bg-purple-600 px-3 py-2 rounded-lg transition-colors uppercase tracking-widest">
                                            View Source ↗
                                        </div>
                                    </div>
                                </a>"""
                            document.getElementById(f"col-{current_col_idx % cols}").appendChild(card)
                            current_col_idx += 1
                
                if has_reached_end:
                    document.getElementById("loading-spinner").classList.add("hidden")
                    document.getElementById("end-message").classList.remove("hidden")
            except Exception as e:
                print(f"Error fetching images: {e}")
            is_loading = False

        # Event Handlers
        async def handle_search(e):
            global current_category, VIBE_CONFIG
            if e.key == "Enter":
                val = e.target.value.strip()
                if not val: return
                
                # Normalize prefix
                if not val.lower().startswith("category:"): 
                    val = "Category:" + val
                else:
                    # Fix casing of "Category:" prefix but preserve the rest
                    val = "Category:" + val[9:]
                
                # First letter of title is usually uppercase in MediaWiki
                if len(val) > 9:
                    val = val[:9] + val[9].upper() + val[10:]
                
                # Validate if category exists
                headers = {"User-Agent": USER_AGENT}
                params = {"action": "query", "titles": val, "format": "json", "origin": "*"}
                resp = await pyfetch(f"https://commons.wikimedia.org/w/api.php?{urllib.parse.urlencode(params)}", headers=headers)
                data = await resp.json()
                pages = data.get('query', {}).get('pages', {})
                
                exists = False
                for k, v in pages.items():
                    if int(k) > 0: # Page ID > 0 means it exists
                        exists = True
                        val = v['title'] # Use the normalized title from API
                
                if exists:
                    # Make it "stick" by adding it to VIBE_CONFIG permanently for this session
                    lines = [line.strip() for line in VIBE_CONFIG.strip().split('\n') if line.strip()]
                    config_cats = [l.split('|')[0].strip() if '|' in l else l.strip() for l in lines]
                    if val not in config_cats:
                        VIBE_CONFIG = VIBE_CONFIG.strip() + f"\n{val}"
                    
                    current_category = val
                    e.target.value = ""
                    await rebuild_dropdown()
                    await reset_and_fetch()
                else:
                    window.alert(f"Category not found: {val}")

        async def handle_refresh(e):
            document.getElementById("refresh-icon").classList.add("animate-refresh")
            await reset_and_fetch()
            await asyncio.sleep(0.5)
            document.getElementById("refresh-icon").classList.remove("animate-refresh")

        def handle_edit_list(e):
            global VIBE_CONFIG
            document.getElementById("modal-error").classList.add("hidden")
            document.getElementById("modal-textarea").value = VIBE_CONFIG.strip()
            document.getElementById("edit-modal").classList.remove("hidden")

        def handle_modal_cancel(e):
            document.getElementById("edit-modal").classList.add("hidden")

        async def handle_modal_save(e):
            global VIBE_CONFIG
            
            # Disable buttons and show loading
            save_btn = document.getElementById("modal-save")
            save_btn.disabled = True
            document.getElementById("save-btn-text").classList.add("hidden")
            document.getElementById("save-btn-loading").classList.remove("hidden")
            document.getElementById("modal-error").classList.add("hidden")
            
            new_config = document.getElementById("modal-textarea").value.strip()
            lines = [l.strip() for l in new_config.split('\n') if l.strip()]
            
            cats_to_check = []
            for line in lines:
                cat = line.split('|')[0].strip() if '|' in line else line.strip()
                if not cat.lower().startswith("category:"):
                    cat = "Category:" + cat
                cats_to_check.append(cat)
            
            # MediaWiki API allows checking up to 50 titles at once
            invalid_cats = []
            normalized_lines = []
            
            # Batch check
            try:
                # Batch check
                headers = {"User-Agent": USER_AGENT}
                params = {
                    "action": "query",
                    "titles": "|".join(cats_to_check),
                    "format": "json",
                    "origin": "*"
                }
                resp = await pyfetch(f"https://commons.wikimedia.org/w/api.php?{urllib.parse.urlencode(params)}", headers=headers)
                data = await resp.json()
                pages = data.get('query', {}).get('pages', {})
                
                # Map titles to existence and normalized form
                title_map = {} # user_input_lower -> api_title or None
                for k, v in pages.items():
                    if int(k) < 0:
                        # Missing
                        title_map[v['title'].lower()] = None
                    else:
                        title_map[v['title'].lower()] = v['title']

                # Reconstruct the config with normalized titles and find invalid ones
                for i, line in enumerate(lines):
                    user_cat = cats_to_check[i]
                    normalized_cat = title_map.get(user_cat.lower())
                    
                    if normalized_cat:
                        if '|' in line:
                            label = line.split('|')[1].strip()
                            normalized_lines.append(f"{normalized_cat} | {label}")
                        else:
                            normalized_lines.append(normalized_cat)
                    else:
                        invalid_cats.append(user_cat)
                
                if invalid_cats:
                    document.getElementById("modal-error").classList.remove("hidden")
                    document.getElementById("error-list").innerText = "Invalid categories: " + ", ".join(invalid_cats)
                    save_btn.disabled = False
                    document.getElementById("save-btn-text").classList.remove("hidden")
                    document.getElementById("save-btn-loading").classList.add("hidden")
                    return

                VIBE_CONFIG = "\n".join(normalized_lines)
                document.getElementById("edit-modal").classList.add("hidden")
                await rebuild_dropdown()
                await reset_and_fetch()
                
            except Exception as e:
                print(f"Validation error: {e}")
                window.alert("An error occurred during validation. Please try again.")
            
            save_btn.disabled = False
            document.getElementById("save-btn-text").classList.remove("hidden")
            document.getElementById("save-btn-loading").classList.add("hidden")

        async def handle_select_change(e):
            global current_category
            current_category = e.target.value
            await reset_and_fetch()

        async def handle_sort_toggle(e):
            global sort_mode_shuffle
            sort_mode_shuffle = not sort_mode_shuffle
            
            knob = document.getElementById("sort-knob")
            toggle = document.getElementById("sort-toggle")
            
            if sort_mode_shuffle:
                knob.style.transform = "translateX(20px)"
                toggle.classList.replace("bg-zinc-700", "bg-purple-600")
            else:
                knob.style.transform = "translateX(0px)"
                toggle.classList.replace("bg-purple-600", "bg-zinc-700")
            
            await reset_and_fetch()

        def handle_view_toggle(e):
            global minimal_view
            minimal_view = not minimal_view
            
            document.getElementById("masonry-container").classList.toggle("minimal-mode")
            knob = document.getElementById("view-knob")
            toggle = document.getElementById("view-toggle")
            
            if minimal_view:
                knob.style.transform = "translateX(-20px)"
                toggle.classList.replace("bg-blue-600", "bg-zinc-800")
            else:
                knob.style.transform = "translateX(0px)"
                toggle.classList.replace("bg-zinc-800", "bg-blue-600")
            
            update_url()

        async def setup():
            global sort_mode_shuffle, minimal_view, current_category, VIBE_CONFIG
            
            # Initial state from URL
            url_params = urllib.parse.parse_qs(window.location.search.lstrip('?'))
            url_cat = url_params.get('cat', [None])[0]
            if url_cat: 
                current_category = url_cat
                # Ensure injected URL cat is also in VIBE_CONFIG
                lines = [line.strip() for line in VIBE_CONFIG.strip().split('\n') if line.strip()]
                config_cats = [l.split('|')[0].strip() if '|' in l else l.strip() for l in lines]
                if current_category not in config_cats:
                    VIBE_CONFIG = VIBE_CONFIG.strip() + f"\n{current_category}"
                
            if url_params.get('sort', [''])[0] == 'shuffle': 
                sort_mode_shuffle = True
            if url_params.get('view', [''])[0] == 'min': 
                minimal_view = True
            
            # Sync UI with initial state
            if sort_mode_shuffle:
                document.getElementById("sort-knob").style.transform = "translateX(20px)"
                document.getElementById("sort-toggle").classList.replace("bg-zinc-700", "bg-purple-600")
            
            if minimal_view:
                document.getElementById("masonry-container").classList.add("minimal-mode")
                document.getElementById("view-knob").style.transform = "translateX(-20px)"
                document.getElementById("view-toggle").classList.replace("bg-blue-600", "bg-zinc-800")
            
            await rebuild_dropdown()
            
            # Attach Event Listeners
            document.getElementById("search-input").addEventListener("keydown", create_proxy(handle_search))
            document.getElementById("refresh-btn").addEventListener("click", create_proxy(handle_refresh))
            document.getElementById("edit-list-btn").addEventListener("click", create_proxy(handle_edit_list))
            document.getElementById("modal-cancel").addEventListener("click", create_proxy(handle_modal_cancel))
            document.getElementById("modal-save").addEventListener("click", create_proxy(handle_modal_save))
            document.getElementById("vibe-select").addEventListener("change", create_proxy(handle_select_change))
            document.getElementById("sort-toggle").addEventListener("click", create_proxy(handle_sort_toggle))
            document.getElementById("view-toggle").addEventListener("click", create_proxy(handle_view_toggle))
            
            # Infinite Scroll Observer
            def on_intersect(entries, observer):
                for entry in entries:
                    if entry.isIntersecting:
                        asyncio.create_task(fetch_images())
            
            observer = window.IntersectionObserver.new(create_proxy(on_intersect), window.Object.new())
            observer.observe(document.getElementById("sentinel"))
            
            await reset_and_fetch()

        # Start the app
        asyncio.create_task(setup())
    </script>
</body>
</html>
